<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowMind</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-13h-7l1-7Z" /></svg>
          </div>
          <span>FlowMind</span>
        </div>

        <nav class="nav-list" aria-label="Primary navigation">
          <button class="nav-item active" type="button" data-view="workflows">
            <svg viewBox="0 0 24 24"><path d="M7 7h4v4H7zM13 13h4v4h-4zM5 9H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M16 15h2a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2M11 9h3a2 2 0 0 1 2 2v2" /></svg>
            <span>Workflows</span>
          </button>
          <button class="nav-item" type="button" data-view="history">
            <svg viewBox="0 0 24 24"><path d="M12 8v5l3 2M21 12a9 9 0 1 1-3-6.7" /></svg>
            <span>Run History</span>
          </button>
          <button class="nav-item" type="button" data-view="team">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8" /></svg>
            <span>Team</span>
          </button>
        </nav>

        <button class="collapse-button" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
        </button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="page-title">Workflows</h1>
            <span class="count-pill" id="page-count">0</span>
          </div>
          <div class="topbar-actions" id="topbar-actions">
            <button class="icon-button" type="button" id="refresh-button" title="Refresh" aria-label="Refresh">
              <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-9 9 8.7 8.7 0 0 1-6-2.3M3 12a9 9 0 0 1 15-6.7M3 5v6h6M21 19v-6h-6" /></svg>
            </button>
            <button class="primary-button" type="button" id="new-workflow-button">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
              <span>New Workflow</span>
            </button>
          </div>
        </header>

        <section class="view active" id="view-workflows" aria-label="Workflows">
          <div class="toolbar">
            <label class="search-box">
              <svg viewBox="0 0 24 24"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" /></svg>
              <input id="workflow-search" type="search" placeholder="Search workflows..." autocomplete="off" />
            </label>
            <div class="tabs" role="tablist" aria-label="Workflow status filter">
              <button class="tab active" type="button" data-filter="all">All</button>
              <button class="tab" type="button" data-filter="active">Active</button>
              <button class="tab" type="button" data-filter="draft">Draft</button>
              <button class="tab" type="button" data-filter="paused">Paused</button>
            </div>
          </div>
          <div class="content-area" id="workflow-content"></div>
        </section>

        <section class="view" id="view-history" aria-label="Run history">
          <div class="content-area" id="history-content"></div>
        </section>

        <section class="view" id="view-team" aria-label="Team">
          <div class="team-wrap">
            <form class="invite-panel" id="invite-form">
              <div class="panel-title">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM20 8v6M23 11h-6" /></svg>
                <span>Invite team member</span>
              </div>
              <div class="invite-row">
                <input id="invite-email" type="email" placeholder="colleague@company.com" required />
                <select id="invite-role" aria-label="Role">
                  <option value="member">Member</option>
                  <option value="admin">Admin</option>
                </select>
                <button class="primary-button" type="submit">
                  <svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z" /></svg>
                  <span>Invite</span>
                </button>
              </div>
            </form>

            <div class="member-section">
              <div class="section-label">
                <svg viewBox="0 0 24 24"><path d="m5 16 2-9 5 5 5-5 2 9M5 20h14" /></svg>
                <span>Admins</span>
              </div>
              <div id="admin-list" class="member-list"></div>
            </div>

            <div class="member-section">
              <div class="section-label muted">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.9" /></svg>
                <span>Members</span>
              </div>
              <div id="member-list" class="member-list"></div>
            </div>
          </div>
        </section>

        <section class="view" id="view-detail" aria-label="Workflow detail">
          <div class="detail-layout">
            <div class="canvas-panel">
              <div class="detail-toolbar">
                <button class="ghost-button" type="button" id="back-button">
                  <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
                  <span>Back</span>
                </button>
                <div class="detail-actions">
                  <button class="ghost-button" type="button" id="save-workflow-button">
                    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2ZM7 3v6h8" /></svg>
                    <span>Save</span>
                  </button>
                  <button class="primary-button" type="button" id="run-now-button">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7Z" /></svg>
                    <span>Run Now</span>
                  </button>
                </div>
              </div>
              <div id="canvas" class="canvas"></div>
            </div>
            <aside class="run-panel">
              <div class="panel-heading">
                <h2>Run Summary</h2>
                <span class="count-pill" id="detail-status">Draft</span>
              </div>
              <div id="run-summary" class="run-summary"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="create-modal" role="dialog" aria-modal="true" aria-labelledby="create-title">
      <form class="create-card" id="create-form">
        <div class="modal-header">
          <div>
            <h2 id="create-title">Create with AI</h2>
            <p>Describe the workflow your team needs.</p>
          </div>
          <button class="icon-button" type="button" id="close-create" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <textarea id="workflow-prompt" rows="6" required>Every morning, check my inbox for emails tagged urgent and create a task in our task list.</textarea>
        <div class="schedule-grid">
          <label>
            <span>Mode</span>
            <select id="workflow-mode">
              <option value="manual">Manual</option>
              <option value="scheduled">Scheduled</option>
            </select>
          </label>
          <label>
            <span>Frequency</span>
            <select id="workflow-schedule">
              <option value="">None</option>
              <option value="daily at 09:00">Daily at 09:00</option>
              <option value="weekdays at 09:00">Weekdays at 09:00</option>
              <option value="hourly">Hourly</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button class="ghost-button" type="button" id="cancel-create">Cancel</button>
          <button class="primary-button" type="submit" id="create-submit">
            <svg viewBox="0 0 24 24"><path d="m12 3 1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3ZM5 15l.9 2.1L8 18l-2.1.9L5 21l-.9-2.1L2 18l2.1-.9L5 15ZM19 14l.8 1.7 1.7.8-1.7.8L19 19l-.8-1.7-1.7-.8 1.7-.8L19 14Z" /></svg>
            <span>Create Workflow</span>
          </button>
        </div>
      </form>
    </div>

    <div class="toast hidden" id="toast"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
